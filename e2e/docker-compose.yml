# jitenv e2e stack. Bring up with `make e2e-up`.
#
# Three install-from-package distros (debian-glibc deb, fedora-glibc rpm,
# alpine-musl tar.gz) plus one source-built alpine image so the musl
# build path against current HEAD is still exercised. All install
# variants depend on `dist/` being populated by `make e2e-build-artifacts`.
#
# All services are unprivileged. The runtime dir for jitenv falls back
# to /tmp/jitenv-<uid> automatically (see internal/agent/paths.go).

services:
  debian:
    build:
      # Build context is the repo root so the Dockerfile can `COPY dist/...`
      # and reach the snapshot .deb produced by goreleaser.
      context: ..
      dockerfile: e2e/Dockerfile.debian
    image: jitenv-e2e-debian
    container_name: jitenv-e2e-debian
    init: true
    # Fresh tmpfs at /tmp keeps each `make e2e-up` cycle deterministic:
    # the agent socket / pidfile / log all land here.
    tmpfs:
      - /tmp:exec,uid=1000,gid=1000
    depends_on:
      localstack:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      JITENV_CONFIG: /home/jitenv/.config/jitenv/config.toml
      LOCALSTACK_HOSTNAME: localstack
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root

  fedora:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.fedora
    image: jitenv-e2e-fedora
    container_name: jitenv-e2e-fedora
    init: true
    tmpfs:
      - /tmp:exec,uid=1000,gid=1000
    depends_on:
      localstack:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      JITENV_CONFIG: /home/jitenv/.config/jitenv/config.toml
      LOCALSTACK_HOSTNAME: localstack
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root

  alpine:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.alpine
    image: jitenv-e2e-alpine
    container_name: jitenv-e2e-alpine
    init: true
    tmpfs:
      - /tmp:exec,uid=1000,gid=1000
    depends_on:
      localstack:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      JITENV_CONFIG: /home/jitenv/.config/jitenv/config.toml
      LOCALSTACK_HOSTNAME: localstack
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root

  powershell:
    # PowerShell 7 on Ubuntu 22.04 — exercises `jitenv hook powershell`
    # and the cwd_glob wrapper flow under a real pwsh process. The
    # Linux jitenv binary runs the *Unix* shim path here, not the
    # Windows .ps1-wrapper / spawn-and-wait path; the Windows-only
    # surface stays covered by Windows CI unit tests.
    build:
      context: ..
      dockerfile: e2e/Dockerfile.powershell
    image: jitenv-e2e-powershell
    container_name: jitenv-e2e-powershell
    init: true
    tmpfs:
      - /tmp:exec,uid=1000,gid=1000
    depends_on:
      localstack:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      JITENV_CONFIG: /home/jitenv/.config/jitenv/config.toml
      LOCALSTACK_HOSTNAME: localstack
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root

  alpine-source:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.alpine-source
    image: jitenv-e2e-alpine-source
    container_name: jitenv-e2e-alpine-source
    init: true
    tmpfs:
      - /tmp:exec,uid=1000,gid=1000
    depends_on:
      localstack:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      JITENV_CONFIG: /home/jitenv/.config/jitenv/config.toml
      LOCALSTACK_HOSTNAME: localstack
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root

  localstack:
    image: localstack/localstack:3.8
    container_name: jitenv-e2e-localstack
    environment:
      SERVICES: secretsmanager
      DEBUG: "0"
      LS_LOG: warn
      AWS_DEFAULT_REGION: us-east-1
      # Skip pro features and dashboard so cold-start is faster.
      EAGER_SERVICE_LOADING: "1"
    healthcheck:
      # /_localstack/health returns 200 when listed services are running.
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q '\"secretsmanager\": \"available\"\\|\"secretsmanager\": \"running\"' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      # Init scripts run on first boot. /etc/localstack/init/ready.d
      # fires after services are listening.
      - ./seed/localstack-init:/etc/localstack/init/ready.d:ro

  # HashiCorp Vault in dev mode. The root token is deterministic
  # (`dev-root`) and listens on 0.0.0.0:8200 inside the compose
  # network. The image's entrypoint runs `vault server -dev` when
  # VAULT_DEV_ROOT_TOKEN_ID is set, so no command override is needed.
  # No host port mapping: scenarios reach Vault via http://vault:8200.
  vault:
    image: hashicorp/vault:1.18
    container_name: jitenv-e2e-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    # Dev mode runs in-memory and unseals automatically; IPC_LOCK would
    # be required for production storage backends, but not here.
    cap_add:
      - IPC_LOCK
    healthcheck:
      # `vault status` exits 0 when initialised & unsealed (the dev
      # default). Probe inside the container so we don't rely on host
      # port mapping.
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 3s
