version: 2

# macOS-only goreleaser config (#13, #226). Used by
# .github/workflows/macos-release.yml on macos-latest to build,
# codesign, and submit each binary for notarization WITHOUT waiting.
# The submission UUIDs are written to $NOTARY_SUBMISSIONS_FILE by the
# build post-hook; the workflow then uploads the dist/ tree + that
# manifest as a workflow artifact for the async poll → finalize jobs
# to consume (#226).
#
# Both the Homebrew cask push and the cosign checksum signing have
# moved out of this config — they now run in macos-release-finalize.yml
# AFTER notarization is Accepted and the tarballs are on the GH
# release. Doing it here would mean publishing a cask whose URLs point
# to assets that don't exist yet.

project_name: jitenv

before:
  hooks:
    - go mod download

builds:
  - id: jitenv
    main: ./cmd/jitenv
    binary: jitenv
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gv/jitenv/internal/version.Version={{.Version}}
      - -X github.com/gv/jitenv/internal/version.Commit={{.ShortCommit}}
      - -X github.com/gv/jitenv/internal/version.Date={{.Date}}
    hooks:
      # Sign each darwin binary and SUBMIT it for notarization
      # without blocking on Apple's queue. UUIDs accumulate in
      # $NOTARY_SUBMISSIONS_FILE (set by the workflow) for the poll
      # job to read. The helper no-ops when MACOS_SIGN_IDENTITY is
      # unset, so a local `goreleaser release --snapshot` still works
      # unsigned for smoke-testing.
      post:
        - cmd: ./packaging/macos/sign-submit.sh "{{ .Path }}" "{{ .Os }}"
          output: true

  - id: jitenv-tui
    main: ./cmd/jitenv-tui
    binary: jitenv-tui
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gv/jitenv/internal/version.Version={{.Version}}
      - -X github.com/gv/jitenv/internal/version.Commit={{.ShortCommit}}
      - -X github.com/gv/jitenv/internal/version.Date={{.Date}}
    hooks:
      post:
        - cmd: ./packaging/macos/sign-submit.sh "{{ .Path }}" "{{ .Os }}"
          output: true

# Archive shape matches the main release's archives exactly (same
# name_template, same bundled files) so users see a coherent
# darwin/linux/windows triplet on the release page.
archives:
  - id: jitenv
    formats: [tar.gz]
    ids:
      - jitenv
      - jitenv-tui
    name_template: "jitenv_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - src: internal/shell/snippets/bash.sh
        dst: snippets/bash.sh
      - src: internal/shell/snippets/zsh.sh
        dst: snippets/zsh.sh
      - src: internal/shell/snippets/powershell.ps1
        dst: snippets/powershell.ps1

# Distinct checksum filename so this doesn't clobber the main
# release's SHA256SUMS (which covers lin/win). cosign-signing of the
# checksum is done in the finalize workflow.
checksum:
  name_template: "jitenv_{{ .Version }}_darwin_SHA256SUMS"

snapshot:
  version_template: "{{ .Version }}-snapshot-{{ .ShortCommit }}"

# The GH release is created by the main release.yml workflow (lin/win);
# this config never touches it. Tarballs + checksums get uploaded by
# the finalize workflow once notarization is Accepted.
release:
  disable: true
