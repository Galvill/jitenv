version: 2

project_name: jitenv

before:
  hooks:
    - go mod download

# Main release builds Linux + Windows only. Darwin binaries (signed
# + notarized) and the Homebrew cask are produced by the separate
# .github/workflows/macos-release.yml workflow on macos-latest after
# this release publishes, so Apple's variable notarization latency
# never blocks lin/win artifacts (or the Chocolatey publish that
# triggers off release:published). See .goreleaser.darwin.yaml.
builds:
  - id: jitenv
    main: ./cmd/jitenv
    binary: jitenv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gv/jitenv/internal/version.Version={{.Version}}
      - -X github.com/gv/jitenv/internal/version.Commit={{.ShortCommit}}
      - -X github.com/gv/jitenv/internal/version.Date={{.Date}}

  # The lightweight hot-path binary the shell hook spawns on every
  # prompt (__chpwd / is-mapped / run / shim). It imports none of the
  # AWS SDK / net-http / source / sync / TUI graph the full binary
  # links, so it starts in ~1.5ms vs ~50ms — the per-prompt cost that
  # made interactive shells laggy. Same internal packages, identical
  # behaviour; the hook falls back to `jitenv` when it's absent.
  - id: jitenv-hook
    main: ./cmd/jitenv-hook
    binary: jitenv-hook
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gv/jitenv/internal/version.Version={{.Version}}
      - -X github.com/gv/jitenv/internal/version.Commit={{.ShortCommit}}
      - -X github.com/gv/jitenv/internal/version.Date={{.Date}}

  # The interactive TUI lives in a separate binary so the main
  # jitenv binary's import graph stays free of Bubble Tea / Lip
  # Gloss / termenv. Those libs send OSC 11 (background color) +
  # CPR (\e[6n) queries to the tty at package-init time; in
  # contexts where the parent doesn't consume the responses
  # (turbo strict-env pty being the canonical example) the
  # responses leak into the user's output stream. See #182 bug B.
  # `jitenv config` re-execs this binary via internal/cli/config.go.
  - id: jitenv-tui
    main: ./cmd/jitenv-tui
    binary: jitenv-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gv/jitenv/internal/version.Version={{.Version}}
      - -X github.com/gv/jitenv/internal/version.Commit={{.ShortCommit}}
      - -X github.com/gv/jitenv/internal/version.Date={{.Date}}

archives:
  - id: jitenv
    # Unix archives are tar.gz; Windows archives are .zip so users can
    # extract with the built-in Explorer/PowerShell unzip without
    # installing tar. format_overrides switches per-GOOS.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # All binaries ship in the same archive so a brew/dpkg/manual
    # install gets them atomically. `ids:` is the v2-spelling
    # of the build allowlist.
    ids:
      - jitenv
      - jitenv-hook
      - jitenv-tui
    name_template: "jitenv_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - src: internal/shell/snippets/bash.sh
        dst: snippets/bash.sh
      - src: internal/shell/snippets/zsh.sh
        dst: snippets/zsh.sh
      - src: internal/shell/snippets/powershell.ps1
        dst: snippets/powershell.ps1

nfpms:
  - id: jitenv
    package_name: jitenv
    ids:
      - jitenv
      - jitenv-hook
      - jitenv-tui
    vendor: Galvill
    homepage: https://github.com/Galvill/jitenv
    maintainer: Galvill <nexvill.ai@gmail.com>
    description: |
      jitenv loads environment variables on demand from pluggable sources
      when configured executables are run, keeping secrets out of the parent
      shell.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: internal/shell/snippets/bash.sh
        dst: /usr/share/jitenv/snippets/bash.sh
      - src: internal/shell/snippets/zsh.sh
        dst: /usr/share/jitenv/snippets/zsh.sh
      - src: LICENSE
        dst: /usr/share/doc/jitenv/LICENSE
      - src: README.md
        dst: /usr/share/doc/jitenv/README.md
    scripts:
      postinstall: packaging/postinstall.sh
      preremove: packaging/preremove.sh

# Homebrew cask + darwin binaries (#13) are NOT in this config: they
# ship via .github/workflows/macos-release.yml using
# .goreleaser.darwin.yaml on macos-latest after the main release
# publishes, so Apple's variable notarization latency can't block the
# lin/win artifacts or the Chocolatey publish that triggers off
# release:published. The darwin tarballs + their cosign-signed
# SHA256SUMS-darwin land on the same GitHub release asynchronously.

# Chocolatey (#180) is intentionally NOT a goreleaser pipe: its
# packer shells out to the `choco` CLI, which only exists on Windows,
# while this release runs on ubuntu. The package is built+pushed by a
# separate windows-latest workflow (.github/workflows/chocolatey.yml)
# from the hand-authored package under packaging/chocolatey/, which
# downloads the windows .zip this release uploads and SHA256-verifies
# it. See that workflow and packaging/chocolatey/ for the details.

# Scoop and winget (below) ARE goreleaser pipes — unlike
# Chocolatey. Their "publish" step is just committing a manifest file
# (Scoop -> the Galvill/scoop-jitenv bucket) or opening a PR (winget ->
# microsoft/winget-pkgs), pure git work that runs fine on this ubuntu
# release runner. They consume the windows .zip + SHA256SUMS produced
# above in this same run, so there's no async ordering problem like the
# darwin cask. Cross-repo pushes need the RELEASE_PAT secret (the default
# GITHUB_TOKEN can't push to other repos); release.yml passes it through.
# skip_upload: "auto" skips prereleases/snapshots, matching Chocolatey.
scoops:
  - repository:
      owner: Galvill
      name: scoop-jitenv
      branch: main
      token: "{{ .Env.RELEASE_PAT }}"
    directory: bucket
    homepage: "https://github.com/Galvill/jitenv"
    description: "Just-in-time environment variable loader, scoped to per-command process trees"
    license: MIT
    skip_upload: "auto"

checksum:
  name_template: SHA256SUMS

signs:
  - id: cosign-checksum
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"

# macOS code-signing + notarization runs out-of-band across three
# workflows (#13, #226):
#   - macos-release.yml builds + signs + SUBMITS each darwin binary
#     to Apple (no --wait) via packaging/macos/sign-submit.sh, then
#     uploads a workflow artifact with the tarballs + submission UUIDs.
#   - macos-notarize-poll.yml runs on a 15-min cron, polls Apple's
#     REST API for each UUID, and dispatches finalize when everything
#     comes back Accepted.
#   - macos-release-finalize.yml cosign-signs the checksum, uploads
#     the darwin tarballs to this release, and pushes the Homebrew
#     cask via packaging/macos/cask-publish.sh.
# Decoupled so Apple's variable notarization latency never blocks
# the lin/win artifacts shipped here.

snapshot:
  version_template: "{{ .Version }}-snapshot-{{ .ShortCommit }}"

release:
  github:
    owner: Galvill
    name: jitenv
  draft: false
  prerelease: auto
  header: |
    ## jitenv {{ .Tag }}

    Linux and Windows artifacts for `amd64` and `arm64`. The macOS
    tarballs + Homebrew cask are signed + notarized + published
    asynchronously by a separate workflow (typically within ~30 min)
    and land on this same release with an `SHA256SUMS-darwin` of
    their own.

    macOS users can install via Homebrew (once the cask is pushed):

    ```sh
    brew install Galvill/jitenv/jitenv
    ```

    Windows users can install via Chocolatey:

    ```powershell
    choco install jitenv
    ```

    macOS binaries are Apple Developer ID code-signed and notarized.
    Windows binaries are **not** Authenticode-signed — SmartScreen
    may prompt on first run. See #39 (Windows signing) for the
    tracking issue. Verify integrity:

    ```sh
    sha256sum -c SHA256SUMS         # linux + windows
    sha256sum -c SHA256SUMS-darwin  # macOS, once published

    cosign verify-blob \
      --certificate-identity-regexp "^https://github.com/Galvill/jitenv/" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      --signature SHA256SUMS.sig --certificate SHA256SUMS.pem SHA256SUMS
    ```
