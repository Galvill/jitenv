version: 2

project_name: jitenv

before:
  hooks:
    - go mod download

builds:
  - id: jitenv
    main: ./cmd/jitenv
    binary: jitenv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gv/jitenv/internal/version.Version={{.Version}}
      - -X github.com/gv/jitenv/internal/version.Commit={{.ShortCommit}}
      - -X github.com/gv/jitenv/internal/version.Date={{.Date}}

  # The interactive TUI lives in a separate binary so the main
  # jitenv binary's import graph stays free of Bubble Tea / Lip
  # Gloss / termenv. Those libs send OSC 11 (background color) +
  # CPR (\e[6n) queries to the tty at package-init time; in
  # contexts where the parent doesn't consume the responses
  # (turbo strict-env pty being the canonical example) the
  # responses leak into the user's output stream. See #182 bug B.
  # `jitenv config` re-execs this binary via internal/cli/config.go.
  - id: jitenv-tui
    main: ./cmd/jitenv-tui
    binary: jitenv-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gv/jitenv/internal/version.Version={{.Version}}
      - -X github.com/gv/jitenv/internal/version.Commit={{.ShortCommit}}
      - -X github.com/gv/jitenv/internal/version.Date={{.Date}}

archives:
  - id: jitenv
    # Unix archives are tar.gz; Windows archives are .zip so users can
    # extract with the built-in Explorer/PowerShell unzip without
    # installing tar. format_overrides switches per-GOOS.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # Both binaries ship in the same archive so a brew/dpkg/manual
    # install gets the pair atomically. `ids:` is the v2-spelling
    # of the build allowlist.
    ids:
      - jitenv
      - jitenv-tui
    name_template: "jitenv_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - src: internal/shell/snippets/bash.sh
        dst: snippets/bash.sh
      - src: internal/shell/snippets/zsh.sh
        dst: snippets/zsh.sh
      - src: internal/shell/snippets/powershell.ps1
        dst: snippets/powershell.ps1

nfpms:
  - id: jitenv
    package_name: jitenv
    ids:
      - jitenv
      - jitenv-tui
    vendor: Galvill
    homepage: https://github.com/Galvill/jitenv
    maintainer: Galvill <nexvill.ai@gmail.com>
    description: |
      jitenv loads environment variables on demand from pluggable sources
      when configured executables are run, keeping secrets out of the parent
      shell.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: internal/shell/snippets/bash.sh
        dst: /usr/share/jitenv/snippets/bash.sh
      - src: internal/shell/snippets/zsh.sh
        dst: /usr/share/jitenv/snippets/zsh.sh
      - src: LICENSE
        dst: /usr/share/doc/jitenv/LICENSE
      - src: README.md
        dst: /usr/share/doc/jitenv/README.md
    scripts:
      postinstall: packaging/postinstall.sh
      preremove: packaging/preremove.sh

# Homebrew tap (#13): goreleaser auto-generates a cask from the
# macOS tarball artifacts and pushes it to a separate tap repo
# (`Galvill/homebrew-jitenv`). End users then install with:
#
#     brew install Galvill/jitenv/jitenv
#
# Cask (not formula) because Homebrew now recommends casks for any
# pre-built binary distribution and goreleaser is phasing out the
# `brews:` block.
#
# Cross-repo pushes need a PAT scoped to the tap repo; the default
# GITHUB_TOKEN can only write to the current repo. `index .Env "..."`
# returns "" when the secret is absent, so `goreleaser release
# --snapshot` keeps working locally — combined with `skip_upload:
# auto` it just generates the cask in dist/ without trying to push.
#
# Without notarization the cask sets `no_quarantine: true` so the
# Gatekeeper hard-block doesn't fire on install. Users still see the
# "downloaded from the internet" warning the first time they invoke
# jitenv via Spotlight/Finder; running from the terminal is fine.
homebrew_casks:
  - name: jitenv
    repository:
      owner: Galvill
      name: homebrew-jitenv
      branch: main
      token: '{{ index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}'
    directory: Casks
    homepage: https://github.com/Galvill/jitenv
    description: Just-in-time env-var injection from pluggable secret sources, scoped to per-command process trees
    skip_upload: auto
    # Ship both halves of the binary split (#182 bug B): jitenv runs
    # everything except the TUI; jitenv-tui is the re-exec target for
    # `jitenv config`. The cask links both into the Homebrew prefix
    # bin/ so `which jitenv-tui` resolves.
    binaries:
      - jitenv
      - jitenv-tui
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew cask update for jitenv {{ .Tag }}"
    # No xattr-strip hook: the binaries are Apple-notarized below, so
    # Gatekeeper accepts them out of the box. If notarization gets
    # disabled (secrets missing on a release), users will need to run
    # `xattr -dr com.apple.quarantine` on jitenv + jitenv-tui once.

# Chocolatey (#180) is intentionally NOT a goreleaser pipe: its
# packer shells out to the `choco` CLI, which only exists on Windows,
# while this release runs on ubuntu. The package is built+pushed by a
# separate windows-latest workflow (.github/workflows/chocolatey.yml)
# from the hand-authored package under packaging/chocolatey/, which
# downloads the windows .zip this release uploads and SHA256-verifies
# it. See that workflow and packaging/chocolatey/ for the details.

checksum:
  name_template: SHA256SUMS

signs:
  - id: cosign-checksum
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"

# Apple Developer ID code-signing + notarization for the
# darwin/amd64 + darwin/arm64 binaries (#13). The release job has
# to run on macOS — codesign and notarytool are macOS-only.
#
# Required GH Actions secrets (set in repo Settings → Secrets):
#
#   MACOS_SIGN_P12          base64 of a Developer ID Application
#                           certificate exported as .p12
#   MACOS_SIGN_PASSWORD     password set when the .p12 was exported
#   MACOS_NOTARY_KEY        base64 of an App Store Connect API key
#                           (.p8 file)
#   MACOS_NOTARY_KEY_ID     the API key ID (e.g. "A1B2C3D4E5")
#   MACOS_NOTARY_ISSUER_ID  the issuer UUID from App Store Connect
#
# `enabled` is a templated boolean. When MACOS_SIGN_P12 is unset
# (no Apple Developer account configured yet, or local snapshot),
# the entire notarize block is skipped and unsigned tarballs ship
# as before. When the secrets are set, each darwin binary is
# code-signed, the archives are submitted to Apple, and goreleaser
# waits for the ticket before publishing the release.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      # Both halves of the binary split (#182): jitenv-tui ships in the
      # cask alongside jitenv and is the re-exec target for `jitenv
      # config`, so it must be signed + notarized too — otherwise, with
      # the cask's xattr-strip hook removed above, Gatekeeper would
      # block jitenv-tui on first run.
      ids:
        - jitenv
        - jitenv-tui
      sign:
        certificate: '{{ .Env.MACOS_SIGN_P12 }}'
        password: '{{ .Env.MACOS_SIGN_PASSWORD }}'
      notarize:
        issuer_id: '{{ .Env.MACOS_NOTARY_ISSUER_ID }}'
        key_id: '{{ .Env.MACOS_NOTARY_KEY_ID }}'
        key: '{{ .Env.MACOS_NOTARY_KEY }}'
        wait: true
        timeout: 20m

snapshot:
  version_template: "{{ .Version }}-snapshot-{{ .ShortCommit }}"

release:
  github:
    owner: Galvill
    name: jitenv
  draft: false
  prerelease: auto
  header: |
    ## jitenv {{ .Tag }}

    Linux, macOS, and Windows artifacts for `amd64` and `arm64`.

    macOS users can install via Homebrew:

    ```sh
    brew install Galvill/jitenv/jitenv
    ```

    Windows users can install via Chocolatey:

    ```powershell
    choco install jitenv
    ```

    macOS binaries are Apple Developer ID code-signed and notarized.
    Windows binaries are **not** Authenticode-signed — SmartScreen
    may prompt on first run. See #39 (Windows signing) for the
    tracking issue. Verify integrity:

    ```sh
    sha256sum -c SHA256SUMS

    cosign verify-blob \
      --certificate-identity-regexp "^https://github.com/Galvill/jitenv/" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      --signature SHA256SUMS.sig --certificate SHA256SUMS.pem SHA256SUMS
    ```
