name: macos-release

# Async macOS release SUBMIT phase (#13, #226). Builds + codesigns +
# submits each darwin binary to Apple's notary without waiting for the
# result, then exits. The poll job (macos-notarize-poll.yml) picks up
# the submission UUIDs from the workflow artifact this job leaves
# behind and, once everything is Accepted, dispatches the finalize
# job (macos-release-finalize.yml) which uploads to the GH release and
# pushes the Homebrew cask.
#
# Before #226 this was a single ~1h job that polled Apple
# synchronously and burned macos-latest minutes for the whole wait.
# Now this job finishes in a few minutes — just long enough to build,
# sign, and queue.
#
# Skips pre-releases (the `-rc.N` tags). workflow_dispatch allows
# manual re-submits against any tag without re-cutting the release.
#
# Injection hygiene: release-supplied values (the tag) flow through
# the job-level env: block and are read as $TAG in run:, never
# inlined as ${{ ... }} inside run:.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sign + submit, e.g. v0.10.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: macos-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  submit:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    runs-on: macos-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up macOS signing keychain
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_SIGN_P12}" ]; then
            echo "::error::MACOS_SIGN_P12 is empty — refuse to ship un-notarized darwin binaries."
            exit 1
          fi
          keychain="$RUNNER_TEMP/jitenv-signing.keychain-db"
          keychain_pw="$(openssl rand -base64 24)"
          cert_p12="$RUNNER_TEMP/cert.p12"
          notary_key="$RUNNER_TEMP/notary-key.p8"

          printf '%s' "$MACOS_SIGN_P12" | base64 --decode > "$cert_p12"
          printf '%s' "$MACOS_NOTARY_KEY" | base64 --decode > "$notary_key"

          security create-keychain -p "$keychain_pw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pw" "$keychain"
          security import "$cert_p12" -k "$keychain" -P "$MACOS_SIGN_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_pw" "$keychain" >/dev/null
          security list-keychains -d user -s "$keychain" \
            $(security list-keychains -d user | sed 's/"//g')

          identity="$(security find-identity -v -p codesigning "$keychain" \
            | awk '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$identity" ]; then
            echo "::error::no 'Developer ID Application' identity found in the imported cert"
            security find-identity -v -p codesigning "$keychain" || true
            exit 1
          fi
          rm -f "$cert_p12"

          submissions_file="$RUNNER_TEMP/notary-submissions.jsonl"
          : > "$submissions_file"

          {
            echo "MACOS_SIGN_IDENTITY=$identity"
            echo "MACOS_KEYCHAIN=$keychain"
            echo "MACOS_KEYCHAIN_PW=$keychain_pw"
            echo "MACOS_NOTARY_KEY_FILE=$notary_key"
            echo "NOTARY_SUBMISSIONS_FILE=$submissions_file"
          } >> "$GITHUB_ENV"
          echo "Imported signing identity $identity"

      - name: Build + submit (no-wait notarize)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # No cask push and no checksum-cosign here — both moved to
          # macos-release-finalize.yml so they run AFTER notarization
          # is Accepted and the tarballs are on the GH release. The
          # build post-hook (sign-submit.sh) appends UUIDs to
          # $NOTARY_SUBMISSIONS_FILE; we upload that next.
          args: release --clean --config .goreleaser.darwin.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Bundle artifact for the poll/finalize jobs
        run: |
          set -euo pipefail
          # Tarballs + checksum from goreleaser + the submissions
          # manifest — everything finalize needs once Apple says yes.
          mkdir -p "$RUNNER_TEMP/pending"
          version="${TAG#v}"
          cp dist/jitenv_*_darwin_*.tar.gz "$RUNNER_TEMP/pending/"
          cp "dist/jitenv_${version}_darwin_SHA256SUMS" "$RUNNER_TEMP/pending/"
          cp "$NOTARY_SUBMISSIONS_FILE" "$RUNNER_TEMP/pending/submissions.jsonl"
          # Stash the tag so the poll job (which doesn't have the
          # release event context) can dispatch finalize with the
          # right input.
          echo "$TAG" > "$RUNNER_TEMP/pending/tag.txt"
          ls -la "$RUNNER_TEMP/pending"

      - name: Upload pending artifact for poll → finalize
        uses: actions/upload-artifact@v4
        with:
          # The poll workflow filters artifacts by this prefix.
          name: darwin-notarize-pending-${{ env.TAG }}
          path: ${{ runner.temp }}/pending/
          # 30 days is well past Apple's longest observed queue
          # latencies and gives the maintainer headroom for a manual
          # re-finalize if something goes sideways.
          retention-days: 30
          if-no-files-found: error

      - name: Trigger first poll immediately
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Route through env to avoid `${{ ... }}` expansion inside
          # the run: shell — see the workflow-injection guidance.
          POLL_REF: ${{ github.ref_name || github.ref }}
        run: |
          set -euo pipefail
          # Cron handles the steady-state polling; this kicks off the
          # first tick right away so we don't wait for the next cron
          # window after a submit.
          gh workflow run macos-notarize-poll.yml \
            -r "$POLL_REF" \
            || echo "::warning::could not trigger poll immediately — cron will pick it up"

      - name: Clean up signing keychain
        if: always()
        run: |
          set -uo pipefail
          if [ -n "${MACOS_KEYCHAIN:-}" ] && [ -f "${MACOS_KEYCHAIN}" ]; then
            security delete-keychain "$MACOS_KEYCHAIN" || true
          fi
          rm -f "${MACOS_NOTARY_KEY_FILE:-}" || true
