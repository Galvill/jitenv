name: website-update

# Refreshes the version-pinned spans in the static site under web/ on
# each STABLE release (#253). It substitutes ONLY the marker-bounded
# spans (see internal/rendocs) — hand-written narrative is never touched
# — then opens a pull request against main for an admin to review and
# squash-merge.
#
# The PR route (rather than a direct push to main) is mandated by the
# `protect-main` ruleset: changes must land via PR with the
# `build / test / lint` status check green and one approval. The branch
# is pushed and the PR opened with RELEASE_PLEASE_TOKEN (a PAT) so that
# opening the PR triggers ci.yml — a GITHUB_TOKEN-authored PR would not
# fire the required check. The commit deliberately OMITS `[skip ci]` so
# that check actually runs and the PR becomes mergeable.
#
# Stable-only: prereleases / RC tags are skipped (same gate the
# chocolatey / macos-release workflows use). Manual re-runs are possible
# via workflow_dispatch with an explicit tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to render (e.g. v0.14.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: website-update
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    # Stable-only. A workflow_dispatch run is always allowed (the caller
    # supplies the tag); a release-triggered run is skipped for
    # prereleases / RC tags. Gate on BOTH the prerelease flag AND the
    # tag-name pattern: a stable tag accidentally published with
    # prerelease:true is still recognized by name, and a '-' in a SemVer
    # tag (e.g. -rc.1) marks a prerelease regardless of the flag. The Go
    # step's IsStableTag remains the final authority (defense in depth).
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease && !contains(github.event.release.tag_name, '-')) }}
    env:
      # For a release event the tag comes from the payload; for a manual
      # run it comes from the dispatch input.
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      # Check out main with the same fine-grained PAT release-please.yml
      # uses, so the branch push + PR below are authored by a user/PAT
      # (which fires CI on the PR) rather than the recursion-guarded
      # GITHUB_TOKEN (whose PRs don't trigger workflows).
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Render version-pinned docs spans
        run: |
          echo "Rendering docs for tag: ${TAG}"
          go run ./cmd/render-docs -tag "${TAG}" -docs web

      - name: Summarize diff
        id: diff
        run: |
          if git diff --quiet -- web; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No docs changes for ${TAG} — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "----- docs diff -----"
            git --no-pager diff --stat -- web
            git --no-pager diff -- web
          fi

      # Open (or update) a PR rather than pushing to main: the
      # `protect-main` ruleset rejects direct pushes. The branch is bot-
      # owned and force-pushed so a manual re-run for the same tag just
      # refreshes the existing PR instead of erroring on a stale branch.
      # GH_TOKEN is the PAT so `gh` acts as a user (PR creation allowed,
      # and the PR fires the required `build / test / lint` check).
      #
      # The commit/PR title uses the `chore` type (NOT `docs`): release-
      # please-config.json gives `docs` a visible changelog section, which
      # makes docs commits releasable and bumps a patch — so a version-pin
      # refresh would itself cut a release, whose `release: published`
      # event re-triggers THIS workflow: an endless patch-bump loop. `chore`
      # is hidden / non-releasable there, so the refresh never bumps the
      # version. The squash-merge commit subject is the PR title, so the
      # title is what release-please actually reads — keep both `chore`.
      - name: Open docs-refresh PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          branch="website/version-pins-${TAG}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${branch}"
          git add web
          git commit -m "chore(website): refresh version pins for ${TAG}"
          git push --force-with-lease origin "${branch}"
          if gh pr view "${branch}" --json state --jq .state >/dev/null 2>&1; then
            echo "PR already open for ${branch}; the force-push above updated it."
          else
            gh pr create \
              --base main \
              --head "${branch}" \
              --title "chore(website): refresh version pins for ${TAG}" \
              --body "$(cat <<EOF
          Automated by the website-update workflow on the ${TAG} release.

          Refreshes only the marker-bounded version spans under web/ (see internal/rendocs); hand-written narrative is untouched. Review the diff and squash-merge.

          The required "build / test / lint" check runs on this PR per the protect-main ruleset.
          EOF
          )"
            echo "Opened docs version-pin PR for ${TAG} (branch ${branch})."
          fi
