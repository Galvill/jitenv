name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build / test / lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download modules
        run: |
          go mod download
          go mod verify

      - name: gofmt
        run: |
          out=$(gofmt -d -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found formatting issues:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2

      - name: golangci-lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -race -covermode=atomic ./...

      - name: Cross-compile for macOS
        run: |
          GOOS=darwin GOARCH=amd64 go build -o /tmp/jitenv-darwin-amd64 ./cmd/jitenv
          GOOS=darwin GOARCH=arm64 go build -o /tmp/jitenv-darwin-arm64 ./cmd/jitenv

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish,sign

  test-macos:
    # Exercises the platform-specific paths that linux runners can't
    # touch: peer_darwin.go (LOCAL_PEERCRED), os.TempDir() runtime-dir
    # fallback, the Setsid double-fork on darwin. Without this the
    # macOS port is "compiles" coverage only, so any syscall-level
    # regression would only surface after release. See #61.
    name: test (macos)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download modules
        run: |
          go mod download
          go mod verify

      - name: Test
        # Skip the shell-* e2e suites: they shell out to bash with
        # restricted PATHs and rely on GNU coreutils not present in
        # the macOS runner image. The peer-cred / agent / run paths
        # are the macOS-specific surface we actually want covered here.
        run: go test -race -covermode=atomic ./internal/agent/... ./internal/agentwarn/... ./internal/cli/... ./internal/config/... ./internal/crypto/... ./internal/run/... ./internal/runnotice/... ./internal/sources/... ./internal/tui/... ./internal/version/...

  test-windows:
    # Stage 1 of native Windows support (#39): exercise the
    # cross-platform compile of the agent + shim + run paths against a
    # real Windows toolchain. Most platform-specific stubs return
    # "not yet implemented" errors at runtime, so the e2e/agent test
    # suites are constrained out via `//go:build !windows` — what runs
    # here is the config/crypto/version surface plus anything else
    # that's already platform-clean. The job is mandatory so a
    # regression in the Windows build (a new Unix-only syscall slipped
    # into a shared file) fails CI immediately rather than being
    # discovered when Stage 2 starts.
    name: test (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download modules
        run: |
          go mod download
          go mod verify

      - name: Build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: Test
        # All tests that need a Unix socket, fork+exec, symlinks, or
        # bash/zsh are gated behind `//go:build !windows` so they
        # compile-skip here. What remains is the cross-platform surface
        # (config, crypto, version, sources, tui, runnotice, agentwarn,
        # the agent's pure-Go bits) — green on Windows means the
        # compile-time scaffolding from #39 stage 1 is still intact.
        run: go test -covermode=atomic ./...
