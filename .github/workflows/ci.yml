name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build / test / lint
    # Skip the duplicate pull_request run on the release-please tracking
    # branch — it only differs from main by CHANGELOG.md + the manifest,
    # so the post-merge push-to-main run already covered the code. Saves
    # ~6 min of CI per merge across the three jobs in this workflow.
    if: ${{ github.event_name == 'push' || !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download modules
        run: |
          go mod download
          go mod verify

      - name: gofmt
        run: |
          out=$(gofmt -d -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found formatting issues:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2

      - name: golangci-lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -race -covermode=atomic ./...

      - name: Cross-compile for macOS
        run: |
          GOOS=darwin GOARCH=amd64 go build -o /tmp/jitenv-darwin-amd64 ./cmd/jitenv
          GOOS=darwin GOARCH=arm64 go build -o /tmp/jitenv-darwin-arm64 ./cmd/jitenv

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish,sign

  test-macos:
    # Exercises the platform-specific paths that linux runners can't
    # touch: peer_darwin.go (LOCAL_PEERCRED), os.TempDir() runtime-dir
    # fallback, the Setsid double-fork on darwin. Without this the
    # macOS port is "compiles" coverage only, so any syscall-level
    # regression would only surface after release. See #61.
    name: test (macos)
    if: ${{ github.event_name == 'push' || !startsWith(github.head_ref, 'release-please--') }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download modules
        run: |
          go mod download
          go mod verify

      - name: Test
        # Skip the shell-* e2e suites: they shell out to bash with
        # restricted PATHs and rely on GNU coreutils not present in
        # the macOS runner image. The peer-cred / agent / run paths
        # are the macOS-specific surface we actually want covered here.
        run: go test -race -covermode=atomic ./internal/agent/... ./internal/agentwarn/... ./internal/cli/... ./internal/config/... ./internal/crypto/... ./internal/run/... ./internal/runnotice/... ./internal/sources/... ./internal/tui/... ./internal/version/...

  test-windows:
    # Native Windows support (#39, stages 2.1-2.6): named-pipe
    # transport, token-SID peer auth, hidden-console daemon spawn,
    # spawn-and-wait run/shim, .ps1 wrapper shims, PowerShell 7 hook,
    # %APPDATA% config path, and .zip release artifacts. Each platform-
    # specific package has companion *_windows_test.go files that
    # exercise the real Windows code paths (winio pipes, %PATHEXT%
    # lookup, doublestar separator normalisation, etc.). The shell
    # hook end-to-end suites stay !windows-tagged because they shell
    # out to bash/zsh; PowerShell e2e is tracked separately.
    name: test (windows)
    if: ${{ github.event_name == 'push' || !startsWith(github.head_ref, 'release-please--') }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download modules
        run: |
          go mod download
          go mod verify

      - name: Build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: Test
        # The bash/zsh hook end-to-end tests (internal/shell/hook_*) and
        # the bash-script-spawning run/shim e2e tests stay `!windows`-
        # tagged. Everything else has Windows-aware logic (or a
        # companion *_windows_test.go) and runs here.
        run: go test -covermode=atomic ./...
